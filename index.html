<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sentinel"/>

<title>Sentinel — Polymarket</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#07070f;--card:#0f0f1a;--card2:#161625;--border:#1e1e30;
  --text:#f0f0ff;--muted:#5a5a80;--dim:#2a2a45;
  --green:#00e5a0;--red:#ff3366;--yellow:#ffb800;--blue:#3b82f6;--purple:#8b5cf6;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body,#app{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,select{font-family:inherit;font-size:16px;outline:none;-webkit-appearance:none}
a{color:inherit;text-decoration:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--dim)}

/* ANIMATIONS */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
@keyframes flash{0%,100%{background:var(--card)}50%{background:rgba(255,51,102,.15)}}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 2s infinite}
.slide-up{animation:slideUp .3s ease}
.flash{animation:flash .6s ease}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* HEADER */
.header{background:rgba(7,7,15,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0;position:sticky;top:0;z-index:50}
.header-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;flex:1}
.logo-poly{color:var(--purple)}
.ws-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.ws-badge.live{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.ws-badge.poll{background:rgba(255,184,0,.1);color:var(--yellow);border:1px solid rgba(255,184,0,.2)}
.ws-badge.off{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.2)}
.header-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px}
.header-stats{display:flex;gap:12px}
.stat{font-size:11px;color:var(--muted)}
.stat b{color:var(--text);font-weight:600}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tab{padding:11px 0;text-align:center;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;position:relative;transition:color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--purple)}
.tab-badge{position:absolute;top:6px;right:calc(50% - 22px);background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;line-height:14px}

/* CARDS */
.feed{padding:12px 14px;padding-bottom:calc(20px + var(--safe-bot))}
.section-head{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:8px 0 8px;display:flex;align-items:center;gap:6px}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* ALERT CARD */
.alert-card{background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.alert-card.high{border-color:rgba(255,51,102,.35);background:rgba(255,51,102,.04)}
.alert-card.med{border-color:rgba(255,184,0,.25)}
.alert-top{padding:12px 14px 10px;display:flex;gap:10px;align-items:flex-start}
.alert-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-icon.high{background:rgba(255,51,102,.12)}
.alert-icon.med{background:rgba(255,184,0,.1)}
.alert-title{font-size:14px;font-weight:600;line-height:1.35;flex:1}
.alert-time{font-size:11px;color:var(--muted);margin-top:3px}
.alert-pills{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-red{background:rgba(255,51,102,.1);color:var(--red)}
.pill-green{background:rgba(0,229,160,.1);color:var(--green)}
.pill-yellow{background:rgba(255,184,0,.1);color:var(--yellow)}
.pill-blue{background:rgba(59,130,246,.1);color:var(--blue)}
.pill-purple{background:rgba(139,92,246,.1);color:var(--purple)}
.pill-dim{background:var(--dim);color:var(--muted)}

/* CONFIDENCE */
.conf-block{padding:10px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.conf-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.conf-label{font-size:11px;color:var(--muted);flex:1}
.conf-pct{font-size:16px;font-weight:800}
.conf-bar-bg{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;flex:1}
.conf-bar{height:100%;border-radius:3px;transition:width .6s ease}
.conf-signals{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.conf-signal{font-size:11px;color:#7070a0;padding-left:2px}
.conf-signal::before{content:"▸ ";color:var(--purple)}

/* CTA */
.alert-cta{padding:10px 14px;display:flex;align-items:center;gap:8px}
.cta-meta{flex:1;font-size:11px;color:var(--muted);line-height:1.4}
.cta-btn{padding:9px 16px;border-radius:12px;font-size:13px;font-weight:700;background:var(--purple);color:#fff;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}

/* MARKET ROW */
.market-row{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;padding:12px 14px;display:flex;gap:10px;align-items:center}
.market-row.flagged{border-color:rgba(255,51,102,.3);border-left:3px solid var(--red)}
.market-row.flagged-med{border-color:rgba(255,184,0,.25);border-left:3px solid var(--yellow)}
.market-info{flex:1;min-width:0}
.market-q{font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.market-sub{font-size:11px;color:var(--muted);margin-top:3px}
.market-right{text-align:right;flex-shrink:0}
.market-price{font-size:16px;font-weight:800}
.market-vol{font-size:10px;color:var(--muted)}
.conf-mini{display:flex;align-items:center;gap:4px;margin-top:4px;justify-content:flex-end}
.conf-mini-bar{width:40px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.conf-mini-fill{height:100%;border-radius:2px}
.conf-mini-pct{font-size:10px;font-weight:600}

/* SETTINGS */
.settings-wrap{padding:16px 14px;padding-bottom:calc(40px + var(--safe-bot))}
.settings-section{margin-bottom:20px}
.settings-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.settings-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.settings-row{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.settings-row:last-child{border-bottom:none}
.s-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.s-text{flex:1}
.s-title{font-size:14px;font-weight:500}
.s-sub{font-size:12px;color:var(--muted);margin-top:1px}
.toggle{width:44px;height:26px;border-radius:13px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer}
.toggle.on{background:var(--green)}
.toggle.off{background:var(--dim)}
.toggle-k{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.toggle.on .toggle-k{left:21px}
.toggle.off .toggle-k{left:3px}
.s-input-wrap{padding:13px 14px;border-bottom:1px solid var(--border)}
.s-input-wrap:last-child{border-bottom:none}
.s-input-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.5px}
.s-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:15px}
.s-input:focus{border-color:var(--purple)}
.save-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;background:var(--purple);color:#fff;margin-top:8px}
.info-box{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}

/* STATUS BANNER */
.banner{margin:0 0 10px;padding:10px 14px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.banner.warn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);color:var(--yellow)}
.banner.ok{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.15);color:var(--green)}
.banner.info{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:var(--purple)}

/* EMPTY */
.empty{text-align:center;padding:60px 30px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.3}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.6}

/* SPINNER */
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%}
.loading-wrap{padding:50px;text-align:center;color:var(--muted);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}

/* RISK METER */
.risk-meter{display:flex;align-items:center;gap:3px;margin-top:4px}
.risk-bar{width:14px;height:4px;border-radius:2px;background:var(--dim)}
.risk-bar.filled-red{background:var(--red)}
.risk-bar.filled-yellow{background:var(--yellow)}
.risk-bar.filled-green{background:var(--green)}

/* NEW ALERT FLASH */
.new-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// STORAGE — persistent, survives app restarts
// ═══════════════════════════════════════════════════════════
const S = {
  get:(k,fb=null)=>{ try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb}catch{return fb} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const ST = {
  tab: 'feed',
  markets: [],
  alerts: S.get('alerts',[]),
  loading: false,
  wsStatus: 'off', // off | connecting | live | poll
  scanning: S.get('scanning',true),
  pushEnabled: false,
  totalAlerts: S.get('totalAlerts',0),
  lastScan: null,
  countdown: 15,
  prevData: S.get('prevData',{}),
  cfg: S.get('cfg',{email:'',emailjs_public:'Iba5R2ToxHNIgc1ge',emailjs_service:'service_6ou6pdo',emailjs_template:'q1ctsi8',minScore:30,scanInterval:15}),
  newAlertCount: 0,
};

// ═══════════════════════════════════════════════════════════
// POLYMARKET API — multiple endpoints for redundancy
// ═══════════════════════════════════════════════════════════
const ENDPOINTS = [
  'https://corsproxy.io/?url=https://gamma-api.polymarket.com/markets?closed=false&limit=50&order=volume24hr&ascending=false',
  'https://corsproxy.io/?url=https://gamma-api.polymarket.com/markets?closed=false&limit=50&order=liquidityNum&ascending=false',
];

async function fetchMarkets() {
  for (const url of ENDPOINTS) {
    try {
      const r = await fetch(url, {cache:'no-store', headers:{'Accept':'application/json'}});
      if (!r.ok) continue;
      const data = await r.json();
      const arr = Array.isArray(data) ? data : (data.data || data.markets || []);
      if (arr.length > 0) return arr;
    } catch(e) { console.warn('Endpoint failed:', url, e.message); }
  }
  return [];
}

// Fetch recent trades for a specific market to detect large trades
async function fetchRecentTrades(conditionId) {
  try {
    const r = await fetch(`https://data-api.polymarket.com/trades?market=${conditionId}&limit=20`, {cache:'no-store'});
    if (!r.ok) return [];
    return await r.json();
  } catch { return []; }
}

// ═══════════════════════════════════════════════════════════
// DETECTION ENGINE
// ═══════════════════════════════════════════════════════════
function detectInsider(m, prev) {
  const signals = [];
  let score = 0;

  let _prices;
    try { _prices = typeof m.outcomePrices==='string' ? JSON.parse(m.outcomePrices) : (m.outcomePrices||[0.5]); } catch { _prices=[0.5]; }
    const price = parseFloat(_prices[0] ?? m.lastTradePrice ?? 0.5);
  const vol24 = parseFloat(m.volume24hr ?? m.volumeNum ?? 0);
  const vol7d  = parseFloat(m.volume ?? 0);
  const liq    = parseFloat(m.liquidityNum ?? m.liquidity ?? 1);
  const spread = parseFloat(m.spread ?? 0);

  const prevPrice = prev?.price ?? price;
  const prevVol   = prev?.vol24 ?? vol24;

  const priceDelta  = Math.abs(price - prevPrice);
  const pricePct    = prevPrice > 0 ? (priceDelta / prevPrice) * 100 : 0;
  const volChange   = prevVol > 0 ? ((vol24 - prevVol) / prevVol) * 100 : 0;
  const volLiqRatio = liq > 0 ? vol24 / liq : 0;

  // 1. Volumen spike
  if (vol24 > 500000) { signals.push(`Massiv volumen: $${fmtN(vol24)} på 24t 🔥`); score += 40; }
  else if (vol24 > 100000) { signals.push(`Høj volumen: $${fmtN(vol24)} på 24t`); score += 25; }
  else if (vol24 > 30000) { signals.push(`Forhøjet volumen: $${fmtN(vol24)}`); score += 12; }

  // 2. Pludselig kursbevægelse
  if (pricePct > 20) { signals.push(`Ekstrem kursbevægelse: ${pricePct.toFixed(1)}% ⚡`); score += 45; }
  else if (pricePct > 8) { signals.push(`Kraftig bevægelse: ${pricePct.toFixed(1)}% siden sidste scan`); score += 28; }
  else if (pricePct > 3) { signals.push(`Usædvanlig bevægelse: ${pricePct.toFixed(1)}%`); score += 15; }

  // 3. Volumen vs likviditet (smart money signal)
  if (volLiqRatio > 10) { signals.push(`Smart money ratio: ${volLiqRatio.toFixed(1)}x likviditet omsættes 🧠`); score += 30; }
  else if (volLiqRatio > 4) { signals.push(`Høj omsætningshastighed: ${volLiqRatio.toFixed(1)}x likviditet`); score += 18; }

  // 4. Volumen stigning
  if (volChange > 100) { signals.push(`Volumen steget ${volChange.toFixed(0)}% siden sidst`); score += 20; }

  // 5. Ekstreme odds (markedet er "for sikker" — mulig insider viden)
  if (price > 0.90) { signals.push(`Markedet prissætter ${(price*100).toFixed(0)}% sandsynlighed — ekstremt højt`); score += 15; }
  else if (price < 0.10) { signals.push(`Markedet prissætter kun ${(price*100).toFixed(0)}% sandsynlighed`); score += 12; }

  // 6. Lav spread = stor interesse / likviditet flows ind
  if (spread > 0 && spread < 0.02 && vol24 > 50000) { signals.push('Meget tight spread — høj handelsaktivitet'); score += 10; }

  return { signals, score: Math.min(score, 100), price, vol24, volLiqRatio, pricePct };
}

// ═══════════════════════════════════════════════════════════
// CONFIDENCE CALCULATOR
// ═══════════════════════════════════════════════════════════
function calcConfidence(m, detection) {
  const price  = detection.price;
  const vol24  = detection.vol24;
  const liq    = parseFloat(m.liquidityNum ?? 1);
  const score  = detection.score;

  // Certainty: how far from 50/50
  const certainty = Math.abs(price - 0.5) * 2; // 0-1

  // Volume strength
  const volScore = Math.min(vol24 / 200000, 1);

  // Liquidity backing
  const liqScore = Math.min(liq / 100000, 1);

  // Signal strength
  const sigScore = score / 100;

  // Weighted confidence
  const raw = (certainty * 40 + volScore * 25 + liqScore * 15 + sigScore * 20);
  return Math.round(Math.max(5, Math.min(raw, 97)));
}

// ═══════════════════════════════════════════════════════════
// INVESTMENT RECOMMENDATION
// ═══════════════════════════════════════════════════════════
function getRecommendation(m, detection, confidence) {
  const price = detection.price;
  const score = detection.score;

  if (score < 30) return null;

  const direction = price > 0.5 ? 'JA' : 'NEJ';
  const odds = price > 0.5 ? price : (1 - price);
  const risk = score >= 60 ? 'HØJ RISIKO' : 'MODERAT RISIKO';

  let action = '';
  if (confidence >= 70 && score >= 50) action = `⚡ KØB ${direction} — ${(odds*100).toFixed(0)}% odds`;
  else if (confidence >= 50) action = `👀 Overvej ${direction} — ${(odds*100).toFixed(0)}% odds`;
  else action = `⚠️ Afvent — usikker signal`;

  return { direction, odds, risk, action, confidence };
}

// ═══════════════════════════════════════════════════════════
// POLYMARKET URL
// ═══════════════════════════════════════════════════════════
function polyUrl(m) {
  const slug = m.slug ?? m.conditionId ?? m.id ?? '';
  if (slug) return `https://polymarket.com/event/${slug}`;
  return 'https://polymarket.com/markets';
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtN(n) {
  n = parseFloat(n) || 0;
  if (n >= 1e6) return `${(n/1e6).toFixed(2)}M`;
  if (n >= 1e3) return `${(n/1e3).toFixed(0)}K`;
  return Math.round(n).toString();
}
function ago(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60) return `${s}s siden`;
  if (s < 3600) return `${Math.floor(s/60)}m siden`;
  return `${Math.floor(s/3600)}t siden`;
}
function confColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 45) return 'var(--yellow)';
  return 'var(--red)';
}
function riskBars(score) {
  const filled = score >= 60 ? 4 : score >= 45 ? 3 : score >= 30 ? 2 : 1;
  const color = score >= 60 ? 'red' : score >= 30 ? 'yellow' : 'green';
  return [1,2,3,4].map(i =>
    `<div class="risk-bar${i<=filled?' filled-'+color:''}"></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let _ac = null;
function playAlert(level='MED') {
  try {
    if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)();
    const freqs = level==='HIGH' ? [440,554,659,880,1047] : [440,554,659];
    freqs.forEach((f,i) => {
      const o=_ac.createOscillator(), g=_ac.createGain();
      o.connect(g); g.connect(_ac.destination);
      o.type = level==='HIGH'?'square':'sine';
      o.frequency.value = f;
      const t = _ac.currentTime + i*0.13;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(level==='HIGH'?.15:.08,t+.04);
      g.gain.exponentialRampToValueAtTime(.001,t+.4);
      o.start(t); o.stop(t+.45);
    });
  } catch {}
}

// ═══════════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════════
async function requestPush() {
  if (!('Notification' in window)) { alert('Din browser understøtter ikke notifikationer. Brug Safari på iPhone.'); return; }
  const p = await Notification.requestPermission();
  ST.pushEnabled = p === 'granted';
  render();
}
function sendPush(title, body, url) {
  if (!ST.pushEnabled || Notification.permission !== 'granted') return;
  try {
    const n = new Notification(title, { body, icon: '/favicon.ico' });
    n.onclick = () => { window.open(url,'_blank'); n.close(); };
  } catch {}
}

// ═══════════════════════════════════════════════════════════
// EMAIL
// ═══════════════════════════════════════════════════════════
async function sendEmail(market, detection, confidence, rec) {
  const cfg = ST.cfg;
  if (!cfg.emailjs_public || !cfg.emailjs_service || !cfg.emailjs_template) return;
  const url = polyUrl(market);
  const message = [
    '🚨 SENTINEL — POLYMARKET INSIDER ADVARSEL',
    '',
    `📊 Market: ${market.question}`,
    `🔗 Link: ${url}`,
    `💰 Nuværende odds: ${(detection.price*100).toFixed(0)}% JA`,
    `📈 Investerings-sikkerhed: ${confidence}%`,
    `⚡ Anbefaling: ${rec?.action||'—'}`,
    '',
    'Signaler:',
    ...detection.signals.map(s => `  • ${s}`),
    '',
    `Volumen 24t: $${fmtN(detection.vol24)}`,
    `Score: ${detection.score}/100`,
    `Tidspunkt: ${new Date().toLocaleString('da-DK')}`,
  ].join('\n');
  try {
    emailjs.init(cfg.emailjs_public);
    await emailjs.send(cfg.emailjs_service, cfg.emailjs_template, {
      title: market.question?.slice(0,60) || 'Insider Signal',
      message: message,
      name: 'Sentinel',
      email: cfg.email || 'sentinel@app.dk',
    });
    console.log('Email sent via EmailJS');
  } catch(e) { console.warn('EmailJS error:', e); }
}

// ═══════════════════════════════════════════════════════════
// SCAN ENGINE
// ═══════════════════════════════════════════════════════════
let _scanTimer=null, _cdTimer=null;
const _seen = new Set();

async function scan() {
  ST.loading = true;
  render();

  try {
    const markets = await fetchMarkets();
    if (!markets.length) { ST.loading=false; render(); return; }

    const newAlerts = [];
    const newPrev   = {};

    markets.forEach(m => {
      const prev = ST.prevData[m.id];
      const det  = detectInsider(m, prev);
      const conf = calcConfidence(m, det);
      const rec  = getRecommendation(m, det, conf);

      m._det  = det;
      m._conf = conf;
      m._rec  = rec;

      newPrev[m.id] = { price: det.price, vol24: det.vol24 };

      if (det.score >= (ST.cfg.minScore||30)) {
        const dedupId = `${m.id}-${Math.floor(Date.now()/60000)}`;
        if (!_seen.has(dedupId)) {
          _seen.add(dedupId);
          const isHigh = det.score >= 60;
          const alert  = {
            id: `${m.id}-${Date.now()}`,
            market: { id:m.id, question:m.question, slug:m.slug, conditionId:m.conditionId, volume24hr:m.volume24hr, liquidityNum:m.liquidityNum },
            det, conf, rec,
            risk: isHigh?'HIGH':'MED',
            ts: Date.now(),
            url: polyUrl(m),
            isNew: true,
          };
          newAlerts.push(alert);

          if (isHigh) {
            playAlert('HIGH');
            sendPush(
              `🚨 ${conf}% sikker — Insider signal!`,
              `${m.question?.slice(0,80)}\n${det.signals[0]||''}`,
              polyUrl(m)
            );
            sendEmail(m, det, conf, rec);
          } else {
            playAlert('MED');
            sendPush(
              `⚠ Polymarket signal (${conf}% sikker)`,
              m.question?.slice(0,80),
              polyUrl(m)
            );
          }
        }
      }
    });

    ST.markets  = markets.sort((a,b)=>(b._det?.score||0)-(a._det?.score||0));
    ST.prevData = newPrev;
    S.set('prevData', newPrev);
    ST.lastScan = Date.now();
    ST.countdown = ST.cfg.scanInterval||15;
    ST.wsStatus = 'poll';

    if (newAlerts.length) {
      ST.alerts = [...newAlerts, ...ST.alerts].slice(0,150);
      ST.totalAlerts += newAlerts.length;
      ST.newAlertCount += newAlerts.length;
      S.set('alerts', ST.alerts.slice(0,50));
      S.set('totalAlerts', ST.totalAlerts);
    }
  } catch(e) { console.error('Scan error:', e); }

  ST.loading = false;
  render();
}

function startScan() {
  scan();
  const interval = (ST.cfg.scanInterval||15)*1000;
  _scanTimer = setInterval(scan, interval);
  _cdTimer   = setInterval(()=>{ ST.countdown=Math.max(0,ST.countdown-1); updateCountdown(); },1000);
}
function stopScan() { clearInterval(_scanTimer); clearInterval(_cdTimer); }

function updateCountdown() {
  const el = document.getElementById('countdown');
  if (el) el.textContent = `${ST.countdown}s`;
}

function renderMarkeder() {
  let html = '<div class="feed">';

  if (ST.loading && ST.markets.length === 0) {
    html += `<div class="loading-wrap"><div class="spinner spin"></div>Henter Polymarket markeder...</div>`;
    return html + '</div>';
  }

  const flagged = ST.markets.filter(m => (m._det?.score||0) >= (ST.cfg.minScore||30));
  const normal  = ST.markets.filter(m => (m._det?.score||0) < (ST.cfg.minScore||30));

  if (flagged.length) {
    html += `<div class="section-head">🚨 Mistænkelig aktivitet (${flagged.length})</div>`;
    flagged.forEach(m => { html += renderMarketRow(m, true); });
  }

  html += `<div class="section-head">📊 Alle markeder (${normal.length})</div>`;
  normal.slice(0,30).forEach(m => { html += renderMarketRow(m, false); });

  html += '</div>';
  return html;
}

  return `
  <div class="market-row ${cls}" onclick="window.open('${polyUrl(m)}','_blank')">
    <div class="market-info">
      <div class="market-q">${m.question||'—'}</div>
      <div class="market-sub">Vol: $${fmtN(det.vol24||0)} · Liq: $${fmtN(parseFloat(m.liquidityNum||0))}</div>

      <div class="market-price" style="color:${price>0.5?'var(--green)':'var(--red)'}">${(price*100).toFixed(0)}%</div>

}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function setTab(t) { ST.tab=t; render(); }
function gotoSettings() { setTab('settings'); }
function toggleScan() {
  ST.scanning = !ST.scanning;
  S.set('scanning', ST.scanning);
  if (ST.scanning) { ST.wsStatus='poll'; startScan(); }
  else { ST.wsStatus='off'; stopScan(); }
  render();
}
function clearAll() {
  if (confirm('Ryd alle alarmer?')) {
    ST.alerts=[]; ST.totalAlerts=0; ST.newAlertCount=0;
    S.set('alerts',[]); S.set('totalAlerts',0);
    render();
  }
}
function saveSettings() {
  const interval = parseInt(document.getElementById('cfg-interval')?.value)||15;
  ST.cfg = {
    email:             document.getElementById('cfg-email')?.value||'',
    emailjs_public:    document.getElementById('cfg-emailjs-public')?.value||'Iba5R2ToxHNIgc1ge',
    emailjs_service:   document.getElementById('cfg-emailjs-service')?.value||'service_6ou6pdo',
    emailjs_template:  document.getElementById('cfg-emailjs-template')?.value||'q1ctsi8',
    minScore:          parseInt(document.getElementById('cfg-score')?.value)||30,
    scanInterval:      Math.max(10, interval),
  };
  S.set('cfg', ST.cfg);

  // Restart scan with new interval
  if (ST.scanning) { stopScan(); startScan(); }

  // Show saved confirmation
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.textContent = '✓ Gemt!'; btn.style.background='var(--green)'; btn.style.color='#000'; }
  setTimeout(()=>setTab('feed'), 1000);
}
